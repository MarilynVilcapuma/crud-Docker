version: '3.8'
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vil-tr-app:latest
    container_name: vil-tr-app
    ports:
      - "8091:8091"
    environment:
      SERVER_PORT: 8091
    depends_on:
      - mysql
    networks:
      - vil-network

  mysql:
    image: mysql:8.0
    container_name: vil-tr-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: studentdb
    networks:
      - vil-network

  nginx:
    image: nginx:alpine
    container_name: vil-tr-nginx
    ports:
      - "8092:8092"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - vil-network

networks:
  vil-network:
    driver: bridge
